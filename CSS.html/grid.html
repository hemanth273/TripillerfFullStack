<!DOCTYPE html>
<html>
    <head>
        <title>My web page</title>
        <style>
            .container{
                display: grid;
                grid-template-columns: auto auto auto ;
                padding: 5%;
                background-color: rgb(218, 116, 116);
            }
            
            .container div{
                font-size: 20px;
                border: solid rgb(117, 224, 230);
                text-align: center;
                padding: 10px;
                background-color: rgb(159, 90, 222);
            }
           
        </style>

    </head>
    <body>
        <div class="container">
            
            <div> item 1</div>
            <div> item 2</div>
            <div> item 3</div>
            <div> item 4</div>
            <div> item 5</div>
            <div> item 6</div>
    
        </div>
    </body>
</html>
