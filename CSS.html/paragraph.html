<!DOCTYPE html>
<html>
    <head>
        <title> My WebPage</title>
        <!--Internal CSS-->
        <style>
        /*Element Selector CSS Comment*/
            h1{
                color: rgb(15, 208, 238);
            }
            /*ID Selector*/
            #myid{
                color: rgb(239, 91, 11);
            }
            /*Class selector*/
            .myclass{
                color: crimson;
            }
               p{
                color:gold;
                font-size:20px;
                font-weight: bold;
                text-align: left;
                border: 2px solid black;
                text-shadow: 2px 2px 4px red;
            }
        </style>
    </head>
    <body>
        <h1>Heading</h1>
        <!--Inline CSS-->
        <p style="color: rgb(239, 16, 139);">Paragraph</p>
        <p id="myid"> Hello World</p>
        <p class="myclass">CSS Training</p>
    </body>
</html>
